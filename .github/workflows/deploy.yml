# Verify the project, then deploy static content to GitHub Pages
name: CI & Deploy to GitHub Pages

on:
    # Runs on pushes targeting the default branch
    push:
        branches: ["main"] # Set to your default branch if it's not 'main'

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Allow one concurrent deployment
concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    # Lint, type-check, unit test, and e2e test
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Lint & format check
              run: bunx biome ci .
            - name: Typecheck
              run: bun run typecheck
            - name: XSS scan (@kitajs/html)
              run: bun run xss-scan
            - name: Unit tests
              run: bun run test
            - name: Install Playwright browsers
              run: bunx playwright install --with-deps chromium
            - name: E2E tests
              run: bun run test:e2e
            - name: E2E tests (production build)
              run: bun run test:e2e:preview
            - name: Upload Playwright report
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

    # Build and publish to GitHub Pages (only if tests pass)
    deploy:
        needs: test
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Build
              run: bun run build
            - name: Setup Pages
              uses: actions/configure-pages@v6
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: "./dist"
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
